# ServiceMonitor: Prometheus scrape metrics từ API pods
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: api
  namespace: demo
  labels:
    app: api
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  selector:
    matchLabels:
      app: api
  # Copy nhãn `app` từ Service vào metric để query trong AnalysisTemplate
  # (flask_http_request_duration_seconds_count{app="api"}) khớp được series.
  targetLabels:
    - app
  endpoints:
  - port: http
    path: /metrics
    interval: 15s
