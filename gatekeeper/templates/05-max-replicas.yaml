# Luật custom (tự viết Rego): Reject Deployment nếu replicas > max
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8smaxreplicas
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    metadata.gatekeeper.sh/title: "Max Replicas"
spec:
  crd:
    spec:
      names:
        kind: K8sMaxReplicas
      validation:
        openAPIV3Schema:
          type: object
          properties:
            max:
              type: integer
              description: Số replicas tối đa cho phép.
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8smaxreplicas

        violation[{"msg": msg}] {
          replicas := input.review.object.spec.replicas
          max := input.parameters.max
          replicas > max
          msg := sprintf("Deployment <%v> có replicas=%v, vượt giới hạn cho phép là %v", [input.review.object.metadata.name, replicas, max])
        }
