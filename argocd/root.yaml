鬠ｿ# Lab 5: app-of-apps root
# Root App: App of Apps pattern - quﾃ｡ﾂｺﾂ｣n lﾃδｽ tﾃ｡ﾂｺﾂ･t cﾃ｡ﾂｺﾂ｣ child applications
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/VoVanTuanAnh/w10-progressive-delivery.git
    path: argocd/apps
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
