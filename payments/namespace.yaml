# Namespace riêng cho team B (payments) — "phòng riêng" cô lập.
# Label policy.sigstore.dev/include=true: OPT-IN guardrail cosign cũ
#   -> mọi pod trong payments bị verify chữ ký (không viết policy mới).
# (an toàn vì app team B dùng image đã ký 0.0.3)
apiVersion: v1
kind: Namespace
metadata:
  name: payments
  labels:
    team: payments
    policy.sigstore.dev/include: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "-1"   # tạo ns trước mọi resource tenant
