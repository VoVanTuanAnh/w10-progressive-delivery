# ExternalSecret: ESO đọc giá trị từ AWS Secrets Manager rồi tạo/đồng bộ
# thành K8s Secret `db-credentials`. refreshInterval=15s -> rotate < 60s.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: db-credentials
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  refreshInterval: 15s          # poll AWS mỗi 15s: đủ nhanh (<60s), không quá spam
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: db-credentials        # tên K8s Secret sẽ được ESO tạo ra
    creationPolicy: Owner        # ESO sở hữu & quản lý Secret này
  data:
    - secretKey: password        # key trong K8s Secret
      remoteRef:
        key: demo/db-password    # tên secret trên AWS Secrets Manager (chuỗi thuần)
