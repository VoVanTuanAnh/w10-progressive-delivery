# SecretStore: kết nối ESO tới AWS Secrets Manager (region ap-southeast-2)
# Auth bằng static credentials nằm trong K8s Secret `awssm-secret`
# (Secret này tạo bằng kubectl create secret — KHÔNG commit vào git).
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: demo
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-southeast-2
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: awssm-secret
            key: access-key
          secretAccessKeySecretRef:
            name: awssm-secret
            key: secret-access-key
