# Demo app đọc DB password từ Secret `db-credentials` qua VOLUME MOUNT.
# Vì sao mount volume mà KHÔNG dùng env:
#   - Secret mount volume -> kubelet tự cập nhật file trong pod khi Secret đổi
#     (vài chục giây), KHÔNG cần restart pod.
#   - Nếu inject qua env -> giá trị "đóng băng" lúc start, đổi Secret phải restart pod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-consumer
  namespace: demo
  labels:
    app: db-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-consumer
  template:
    metadata:
      labels:
        app: db-consumer
    spec:
      containers:
      - name: app
        image: busybox:1.36
        command: ["sh", "-c", "while true; do sleep 3600; done"]
        resources:
          limits:
            cpu: 50m
            memory: 32Mi
        volumeMounts:
        - name: db
          mountPath: /mnt/db
          readOnly: true
      volumes:
      - name: db
        secret:
          secretName: db-credentials
